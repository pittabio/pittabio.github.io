<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="head_title"></title>

    <!-- ## CSS ## -->
    <link rel="stylesheet" href="../style/core.css">    <!-- Core: Base, Header, Footer -->

    <!-- Sections -->
    <link rel="stylesheet" href="../style/pages/about.css">               <!-- Manages the timeline and resume header -->
    <link rel="stylesheet" href="../style/sections/section-projects.css"> <!-- Manages the gallery (grid and card) -->
    <link rel="stylesheet" href="../style/sections/section-contact.css">  <!-- Manages the final CTA section -->
    <link rel="stylesheet" href="../style/pages/project.css">             <!-- Manages banners and videos -->
</head>
<body>

<!-- ## HEADER ## -->
<div id="header"></div>

<!-- ## IMAGES OVERLAY ## -->
<div class="overlay" id="overlay" onclick="closePopup()">
    <div class="popup-img-wrap" id="popupWrap">
        <button class="btn-close" onclick="closePopup()" aria-label="close">✕</button>
        <img id="popupImg" src="" alt="">
    </div>
</div>

<!-- ## PAGE ## -->
<main class="page-content resume-page-section">

    <!-- ## PAGE HEAD ## -->
    <div class="resume-header">
        <span class="hero-tag"        data-i18n-html="goblin_page.tag"></span>
        <h1 class="contact-title"     data-i18n-html="goblin_page.title"></h1>
        <p  class="contact-subtitle"  data-i18n="goblin_page.subtitle"></p>
    </div>

    <!-- ## BANNER IMAGE ## -->
    <section class="resume-section">
        <div class="section-container">
            <img
                    src="../media/games/goblin-jr/banner.png"
                    alt="Goblin Jr. Adventure Banner"
                    class="project-banner"
                    onclick="openPopup(this)"
            />
        </div>
    </section> <!-- END banner -->

    <!-- ## ABOUT ## -->
    <section class="resume-section" id="about">
        <div class="section-container">
            <div class="education-timeline">

                <!-- 1. Overview -->
                <div class="timeline-entry">
                    <div class="timeline-date"  data-i18n-html="goblin_page.about.tag"></div>
                    <div class="timeline-role"  data-i18n-html="goblin_page.about.title"></div>
                    <p class="timeline-details" data-i18n-html="goblin_page.about.desc"></p>
                </div>

                <!-- 2. Gameplay & Features -->
                <div class="timeline-entry">
                    <div class="timeline-date"  data-i18n-html="goblin_page.gameplay.tag"></div>
                    <div class="timeline-role"  data-i18n-html="goblin_page.gameplay.title"></div>
                    <ul class="timeline-details" data-i18n-html="goblin_page.gameplay.items"></ul>
                </div>

                <!-- 3. Technical Architecture (C++/UE5) -->
                <div class="timeline-entry">
                    <div class="timeline-date"  data-i18n-html="goblin_page.tech.tag"></div>
                    <div class="timeline-role"  data-i18n-html="goblin_page.tech.title"></div>
                    <ul class="timeline-details" data-i18n-html="goblin_page.tech.items"></ul>
                </div>

                <!-- 4. Optimization & Systems -->
                <div class="timeline-entry">
                    <div class="timeline-date"  data-i18n-html="goblin_page.systems.tag"></div>
                    <div class="timeline-role"  data-i18n-html="goblin_page.systems.title"></div>
                    <ul class="timeline-details" data-i18n-html="goblin_page.systems.items"></ul>
                </div>

            </div>
        </div>
    </section> <!-- END about -->

    <!-- ## VIDEO ## -->
    <section class="resume-section" id="video">
        <div class="section-container">
            <h2 class="section-title" data-i18n="goblin_page.video_title"></h2>
            <div class="project-video-wrapper">
                <!-- Replace VIDEO_ID with the actual YouTube video ID -->
                <iframe
                        src="https://www.youtube.com/embed/4Z7O6lCzQM4"
                        title="Goblin Jr. Adventure Trailer"
                        allowfullscreen
                ></iframe>
            </div>
        </div>
    </section> <!-- END video -->

    <!-- ## GALLERY ## -->
    <section class="resume-section" id="gallery">
        <div class="section-container">
            <h2 class="section-title" data-i18n="goblin_page.gallery_title"></h2>

            <!-- ## GRID ## -->
            <div class="projects-grid">

                <!-- 1. Solution Architecture -->
                <div class="project-card">
                    <img src="../media/games/goblin-jr/solution-public.png" alt="C++ Architecture" class="project-image" onclick="openPopup(this)" />
                    <h3 class="project-name" data-i18n="goblin_page.gallery.architecture_title"></h3>
                    <p class="project-desc" data-i18n-html="goblin_page.gallery.architecture_desc"></p>
                </div>

                <!-- 2. Hybrid Workflow (Chest BP & C++ link) -->
                <div class="project-card">
                    <img src="../media/games/goblin-jr/chest.png" alt="Hybrid Workflow" class="project-image" onclick="openPopup(this)" />
                    <h3 class="project-name" data-i18n="goblin_page.gallery.hybrid_title"></h3>
                    <p class="project-desc" data-i18n-html="goblin_page.gallery.hybrid_desc"></p>
                </div>

                <!-- 3. Persistence (SaveSettings) -->
                <div class="project-card">
                    <img src="../media/games/goblin-jr/SaveSettings.png" alt="Save System" class="project-image" onclick="openPopup(this)" />
                    <h3 class="project-name" data-i18n="goblin_page.gallery.persistence_title"></h3>
                    <p class="project-desc" data-i18n-html="goblin_page.gallery.persistence_desc"></p>
                </div>

                <!-- 4. Input (Mapping) -->
                <div class="project-card">
                    <img src="../media/games/goblin-jr/mapping.png" alt="Enhanced Input" class="project-image" onclick="openPopup(this)" />
                    <h3 class="project-name" data-i18n="goblin_page.gallery.input_title"></h3>
                    <p class="project-desc" data-i18n-html="goblin_page.gallery.input_desc"></p>
                </div>

                <!-- 5. Global State Management -->
                <div class="project-card">
                    <img src="../media/games/goblin-jr/instance.png" alt="Instance - Global State Management" class="project-image" onclick="openPopup(this)" />
                    <h3 class="project-name" data-i18n="goblin_page.gallery.instance_title"></h3>
                    <p class="project-desc" data-i18n-html="goblin_page.gallery.instance_desc"></p>
                </div>

                <!-- 6. UI Hierarchy -->
                <div class="project-card">
                    <img src="../media/games/goblin-jr/pause-widget.png" alt="Pause UI Hierarchy" class="project-image" onclick="openPopup(this)" />
                    <h3 class="project-name" data-i18n="goblin_page.gallery.ui_title"></h3>
                    <p class="project-desc" data-i18n-html="goblin_page.gallery.ui_desc"></p>
                </div>

            </div> <!-- END grid -->
        </div>   <!-- END container -->
    </section> <!-- END gallery -->

    <!-- ## CTA ## -->
    <section class="contact-section">
        <div class="contact-inner">
            <h2 class="contact-title"    data-i18n-html="goblin_page.cta.title"></h2>
            <p  class="contact-subtitle" data-i18n="goblin_page.cta.subtitle"></p>

            <div class="contact-socials">
                <!-- itch.io -->
                <a href="https://pittabio.itch.io/goblin-jr-adventure" target="_blank" class="contact-social-link">
                    <img src="../media/logo/itchio.png" alt="itch.io" height="16" width="16"/>
                    itch.io
                </a>
                <a href="https://github.com/pittabio/GoblinJrAdventure" target="_blank" class="contact-social-link">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/github/github-original.svg" alt="github" height="16" width="16"/>
                    GitHub
                </a>
            </div>

            <div class="contact-divider">
                <span data-i18n="goblin_page.cta.or"></span>
            </div>

            <a href="../projects.html" class="contact-cta">
                <span data-i18n="goblin_page.cta.btn_back"></span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 5l7 7-7 7"/></svg>
            </a>
        </div>
    </section> <!-- END cta -->

</main>

<!-- ## FOOTER ## -->
<div id="footer"></div>

<!-- ## JAVASCRIPT ## -->
<script src="../scripts/main.js"></script>
<script src="../scripts/overlay.js"></script>

</body>
</html>
