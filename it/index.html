<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Pittaccio</title>

    <!-- SEO optimization (languages) -->
    <link rel="alternate" hreflang="en" href="https://pittabio.github.io/index.html">
    <link rel="alternate" hreflang="it" href="https://pittabio.github.io/it/index.html">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- CDN DevCon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">

    <!-- CSS Style -->
    <link rel="stylesheet" href="/style.css">

</head>
<body>

<!-- HEADER -->
<div id="header-placeholder"></div>

<!-- PAGE -->
<main class="page-content">
    <section class="hero test-section" style="padding-top: calc(var(--height) + 3rem);">
        <div class="hero-content">
            <h1>LAVORI IN CORSO</h1>
        </div>
    </section>
</main>

<!-- ## JAVASCRIPT ## -->
<!-- Header -->
<script>
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            // Load header
            document.getElementById('header-placeholder').innerHTML = data;

            // Active the specific links for this page
            document.getElementById('nav-home').classList.add('active');
            document.getElementById('lang-en').classList.add('active');

            // Reactive mobile menu script
            const toggle = document.getElementById('mobile-toggle');
            toggle.addEventListener('click', () => {
                toggle.classList.toggle('open');
                // TODO: logic for the mobile drawer
            });

            // Scroll management for the .scrolled class
            window.addEventListener('scroll', () => {
                const header = document.querySelector('.site-header');
                if (window.scrollY > 20) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            });
        })
        .catch(error => console.error('ERROR loading header:', error));
</script>

</body>
</html>
