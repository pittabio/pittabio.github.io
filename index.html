<!DOCTYPE html>
<html lang="">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fabio Pittaccio</title>

	<!-- CSS Style -->
	<link rel="stylesheet" href="style/style_main.css">
	<link rel="stylesheet" href="style/style_mobile.css">
	<link rel="stylesheet" href="style/style_projects.css">
	<link rel="stylesheet" href="style/style_about.css">

	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

	<!-- CDN DevCon -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">

</head>
<body>

<!-- HEADER -->
<div id="header"></div>

<!-- PAGE -->
<main class="page-content">
	<!-- HERO SECTION -->
	<section class="hero" id="home">
		<!-- LEFT PART: TEXT -->
		<div class="hero-content">
			<!-- Tag & Name-->
			<span class="hero-tag" data-i18n="hero.tag"></span>
			<h1>Fabio Pittaccio</h1>

			<!-- Presentation -->
			<p data-i18n-html="hero.presentation"></p>

			<!-- Buttons -->
			<div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:center; margin-bottom: 2rem;">
				<a href="#" class="hero-cta">
					<span data-i18n="hero.projects"></span>
					<!-- svg arrow -->
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 5l7 7-7 7"/></svg>
				</a>
			</div>

			<!-- Quick info -->
			<div class="hero-info">
				<div>
					<a>5+</a>
					<br>
					<b data-i18n="hero.info.published"></b>
				</div>
				<div>
					<a>UE5</a>
					<br>
					<b data-i18n="hero.info.engine"></b>
				</div>
				<div>
					<a>PC · Android</a>
					<br>
					<b data-i18n="hero.info.platforms"></b>
				</div>
			</div>
		</div>

		<!-- RIGHT PART: PHOTO -->
		<div style="padding-right: 2rem;">
			<img src="/media/profile.jpg" alt="Fabio Pittaccio" class="hero-image" />
		</div>

		<!-- BUTTON PART: INDICATOR -->
		<a href="#about" class="scroll-indicator" aria-label="Scroll to the projects section">
			<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#DADADA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v13M5 12l7 7 7-7"/></svg>
		</a>
	<!-- END HERO -->
	</section>

	<!-- SHORT ABOUT -->
	<section class="about-skills" id="about">
		<div class="section-container">
			<h2 class="section-title" data-i18n="about.title"></h2>

			<!-- Grid -->
			<div class="about-grid">
				<!-- UE Specialist -->
				<div class="about-item">
					<div class="about-icon">🚀</div>
					<h3 data-i18n="about.item1.title"></h3>
					<p data-i18n="about.item1.desc"></p>
				</div>
				<!-- Cross-Platform -->
				<div class="about-item">
					<div class="about-icon">📱</div>
					<h3 data-i18n="about.item2.title"></h3>
					<p data-i18n="about.item2.desc"></p>
				</div>
				<!-- Full-Cycle Dev -->
				<div class="about-item">
					<div class="about-icon">🛠️</div>
					<h3 data-i18n="about.item3.title"></h3>
					<p data-i18n="about.item3.desc"></p>
				</div>
			</div>

			<!-- Find More -->
			<div style="text-align: center; margin: 3rem 0;">
				<a href="#" class="resume-link">
					<span data-i18n="about.find_more"></span>
					<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 5l7 7-7 7"/></svg>
				</a>
			</div>

			<!-- LOGOS -->
			<div class="skills-bar">
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/unrealengine/unrealengine-original.svg" alt="unreal engine logo" width="40" height="40"/>
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/cplusplus/cplusplus-original.svg" alt="cplusplus logo" width="40" height="40"/>
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/git/git-original.svg" alt="git logo" width="40" height="40"/>
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/github/github-original.svg" alt="github logo" width="40" height="40"/>
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/gitlab/gitlab-original.svg" alt="gitlab logo" width="40" height="40"/>
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/gitkraken/gitkraken-original-wordmark.svg" alt="GitKraken logo" width="40" height="40" />
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/android/android-plain.svg" alt="android logo" width="40" height="40"/>
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/windows8/windows8-original.svg" alt="windows logo" width="40" height="40"/>
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/jetbrains/jetbrains-original.svg" alt="JetBrains logo" width="40" height="40"/>
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/rider/rider-original.svg" alt="rider logo" width="40" height="40"/>
			</div>
		</div>
	</section>

</main>

<!-- ## JAVASCRIPT ## -->
<script src="scripts/main.js"></script>

</body>
</html>
