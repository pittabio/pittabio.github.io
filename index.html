<!DOCTYPE html>
<html lang="">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title data-i18n="head_title"></title>

	<!-- ## CSS ## -->
	<link rel="stylesheet" href="style/core.css">  <!-- Core: Base, Header, Footer -->

	<!-- Sections -->
	<link rel="stylesheet" href="style/sections/section-about.css">    <!-- Bio & Tech bar -->
	<link rel="stylesheet" href="style/sections/section-projects.css"> <!-- Cards & Games grid -->
	<link rel="stylesheet" href="style/sections/section-contact.css">  <!-- Badge & Final CTA -->

	<!-- Page specifics -->
	<link rel="stylesheet" href="style/pages/home.css">  <!-- Hero & Intro -->
</head>
<body>
<!-- ## HEADER ## -->
<div id="header"></div>

<!-- ## IMAGES OVERLAY ## -->
<div class="overlay" id="overlay" onclick="closePopup()">
	<div class="popup-img-wrap" id="popupWrap">
		<button class="btn-close" onclick="closePopup()" aria-label="close">✕</button>
		<img id="popupImg" src="" alt="">
	</div>
</div>

<!-- ## PAGE ## -->
<main class="page-content">
	<!-- ## HERO SECTION ## -->
	<section class="hero" id="home">
		<!-- LEFT PART: TEXT -->
		<div class="hero-content">
			<!-- Tag & Name-->
			<span class="hero-tag" data-i18n="hero.tag"></span>
			<h1>Fabio Pittaccio</h1>

			<!-- Presentation -->
			<p data-i18n-html="hero.presentation"></p>

			<!-- Button -->
			<div class="hero-bt-container">
				<a href="#" class="hero-bt">
					<span data-i18n="hero.projects"></span>
					<!-- svg arrow -->
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 5l7 7-7 7"/></svg>
				</a>
			</div>

			<!-- Quick info -->
			<div class="hero-info">
				<div>
					<a>5+</a>
					<br>
					<b data-i18n="hero.info.published"></b>
				</div>
				<div>
					<a>UE5</a>
					<br>
					<b data-i18n="hero.info.engine"></b>
				</div>
				<div>
					<a>PC · Android</a>
					<br>
					<b data-i18n="hero.info.platforms"></b>
				</div>
			</div>
		</div>

		<!-- RIGHT PART: PHOTO -->
		<div style="padding-right: 2rem;">
			<img src="/media/profile.jpg" alt="Fabio Pittaccio" class="hero-image" onclick="openPopup(this)"/>
		</div>

		<!-- BUTTON PART: INDICATOR -->
		<a href="#about" class="scroll-indicator" aria-label="Scroll to the about section">
			<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#DADADA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v13M5 12l7 7 7-7"/></svg>
		</a>
	</section> <!-- END hero -->

	<!-- ## SHORT ABOUT ## -->
	<section class="about-skills" id="about">
		<div class="section-container">
			<h2 class="section-title" data-i18n="about.title"></h2>

			<!-- Grid -->
			<div class="about-grid">
				<!-- UE Specialist -->
				<div class="about-item">
					<div class="about-icon">🚀</div>
					<h3 data-i18n="about.item1.title"></h3>
					<p data-i18n="about.item1.desc"></p>
				</div>
				<!-- Cross-Platform -->
				<div class="about-item">
					<div class="about-icon">📱</div>
					<h3 data-i18n="about.item2.title"></h3>
					<p data-i18n="about.item2.desc"></p>
				</div>
				<!-- Full-Cycle Dev -->
				<div class="about-item">
					<div class="about-icon">🛠️</div>
					<h3 data-i18n="about.item3.title"></h3>
					<p data-i18n="about.item3.desc"></p>
				</div>
			</div>

			<!-- Find More -->
			<div class="about-more">
				<a href="#" class="resume-link">
					<span data-i18n="about.find_more"></span>
					<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 5l7 7-7 7"/></svg>
				</a>
			</div>

			<!-- Technologies icons bar -->
			<div class="skills-bar">
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/unrealengine/unrealengine-original.svg"      alt="Unreal Engine" />
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/cplusplus/cplusplus-original.svg"            alt="C++" />
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/git/git-original.svg"                        alt="Git" />
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/github/github-original.svg"                  alt="GitHub" />
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/gitlab/gitlab-original.svg"                  alt="GitLab" />
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/gitkraken/gitkraken-original-wordmark.svg"   alt="GitKraken" />
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/android/android-plain.svg"                   alt="Android SDK" />
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/rider/rider-original.svg"                    alt="JetBrains Rider" />
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/blender/blender-original.svg"                alt="Blender" />
				<img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/photoshop/photoshop-original.svg"            alt="Adobe Photoshop" />
			</div>
		</div>
	</section> <!-- END short about -->

	<!-- ## FEATURED PROJECTS ## -->
	<section class="projects-section" id="projects">
		<div class="section-container">
			<!-- Title -->
			<h2 class="section-title" data-i18n="projects.title"></h2>

			<!-- Description -->
			<div class="about-more">
				<p data-i18n="about.item1.desc"></p>
			</div>

			<!-- GRID -->
			<div class="projects-grid">
				<!-- ## Ruins' Rhapsody ## -->
				<div class="project-card">
					<!-- Title and image -->
					<a href="projects/ruins-rhapsody.html" class="project-link" target="_blank">
						<h3 class="project-name" data-i18n="projects.ruins.name"></h3>
					</a>
					<img src="media/games/ruins-rhapsody/banner.jpg" alt="Ruins' Rhapsody Banner" class="project-image" onclick="openPopup(this)"/>

					<br>
					<!-- Description and links -->
					<p class="project-desc" data-i18n-html="projects.ruins.desc"></p>
					<div class="project-links">
						<a href="projects/ruins-rhapsody.html" class="link-secondary" data-i18n="projects.link2"></a>
						<a href="https://pittabio.itch.io/ruins-rhapsody-demo" target="_blank" class="link-primary" data-i18n="projects.link1"></a>
					</div>
				</div>

				<!-- ## Goblin Jr. Adventure ## -->
				<div class="project-card">
					<!-- Title and image -->
					<a href="projects/goblin-jr.html" class="project-link" target="_blank">
						<h3 class="project-name" data-i18n="projects.goblin.name"></h3>
					</a>
					<img src="media/games/goblin-jr/banner.png" alt="Goblin Jr. Adventure Banner" class="project-image" onclick="openPopup(this)"/>

					<br>
					<!-- Description and links -->
					<p class="project-desc" data-i18n-html="projects.goblin.desc"></p>
					<div class="project-links">
						<a href="projects/goblin-jr.html" class="link-secondary" data-i18n="projects.link2"></a>
						<a href="https://pittabio.itch.io/goblin-jr-adventure" target="_blank" class="link-primary" data-i18n="projects.link1"></a>
					</div>
				</div>

				<!-- ## Zombie Siege Chronicles ## -->
				<div class="project-card">
					<!-- Title and image -->
					<a href="projects/zombie-siege.html" class="project-link" target="_blank">
						<h3 class="project-name" data-i18n="projects.zombie.name"></h3>
					</a>
					<img src="media/games/zombie-siege/banner.png" alt="Zombie Siege Chronicles Banner" class="project-image" onclick="openPopup(this)"/>

					<br>
					<!-- Description and links -->
					<p class="project-desc" data-i18n-html="projects.zombie.desc"></p>
					<div class="project-links">
						<a href="projects/zombie-siege.html" class="link-secondary" data-i18n="projects.link2"></a>
						<a href="https://fabriziop.itch.io/zombie-siege-chronicles" target="_blank" class="link-primary" data-i18n="projects.link1"></a>
					</div>
				</div>
			</div>

			<!-- Button -->
			<div class="about-more">
				<a href="#" class="hero-bt">
					<span data-i18n="projects.view_all"></span>
					<!-- svg arrow -->
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 5l7 7-7 7"/></svg>
				</a>
			</div>
		</div>
	</section> <!-- END featured projects -->

	<!-- ## CONTACT ## -->
	<section class="contact-section" id="contact">
		<div class="contact-inner">

			<!-- TEXT -->
			<span class="contact-tag" data-i18n="contact.tag"></span>
			<h2 class="contact-title" data-i18n-html="contact.title"></h2>
			<p class="contact-subtitle" data-i18n="contact.subtitle"></p>
			<div class="contact-badge" data-i18n="contact.badge"></div>

			<!-- BUTTONS -->
			<div class="contact-socials">
				<!-- e-mail -->
				<a href="mailto:pittacciofabio@proton.me" class="contact-social-link">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
					Email
				</a>

				<!-- LinkedIn -->
				<a href="https://linkedin.com/in/fabio-pittaccio" target="_blank" class="contact-social-link">
					<i class="devicon-linkedin-plain"></i>
					LinkedIn
				</a>

				<!-- GitHub -->
				<a href="https://github.com/pittabio" target="_blank" class="contact-social-link">
					<i class="devicon-github-original"></i>
					Github
				</a>

				<!-- itch.io -->
				<a href="https://pittabio.itch.io" target="_blank" class="contact-social-link">
					<img src="media/logo/itchio.png" alt="itch.io mini logo" height="16" width="16"/>
					itch.io
				</a>
			</div>

			<!-- Divider -->
			<div class="contact-divider"><span data-i18n="contact.or"></span></div>

			<!-- Full Contacts Button -->
			<a href="contacts.html" class="contact-cta">
				<span data-i18n="contact.cta"></span>
				<!-- svg arrow -->
				<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 5l7 7-7 7"/></svg>
			</a>
		</div>
	</section> <!-- END contact -->

	<!-- ## FOOTER ## -->
	<div id="footer"></div>

</main>

<!-- ## JAVASCRIPT ## -->
<script src="scripts/main.js"></script>
<script src="scripts/overlay.js"></script>

</body>
</html>
