<link rel="stylesheet" href="style/style_contacts_success.css">
<div id="contact-success-modal" class="overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="project-card" style="max-width: 460px; width: 100%; margin: 1.5rem; text-align: center; padding: 3rem 2.5rem;">

        <!-- Icon -->
        <div class="contact-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>

        <!-- Text -->
        <h2 id="modal-title" class="project-name" data-i18n="contact_page.modal.title">
            Message sent!
        </h2>
        <p class="contact-text" data-i18n="contact_page.modal.subtitle">
            Thank you for reaching out. I'll get back to you as soon as possible.
        </p>

        <!-- Close button -->
        <button class="contact-submit-btn" id="modal-close-btn" type="button">
            <span data-i18n="contact_page.modal.close">Close</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h13M12 5l7 7-7 7"/>
            </svg>
        </button>
    </div>
</div>
